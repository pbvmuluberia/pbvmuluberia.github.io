    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbxpMq9rf_BEg_9ZfuobOLYcJe1dzfs5KZauWjHAuc_V3OlLCZ60yl30BMaqJli8EFtVsA/exec";

      async function fetchData() {
        const name = document.getElementById('name').value;
        const school = document.getElementById('school').value;
        const resultsDiv = document.getElementById('result-display');

        //DISABLE BUTTON & SHOW LOADER
        searchBtn.disabled = true; // Disable the button
        resultsDiv.removeAttribute('data-translate-key');
        resultsDiv.innerHTML = '<div class="loader"><br></div>';


        try {
          // Construct the URL with query parameters
          const finalUrl = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&school=${encodeURIComponent(school)}`;

          // Fetch from GAS (Google handles the Redirect/CORS automatically via this method)
          const response = await fetch(finalUrl);
          const data = await response.json();

          resultsDiv.innerHTML = ""; // Clear loader

          if (data.length > 0) {
            const student = data[0];

            const lang = getLang();

            const outputHTML = `
              <div class="result-success-content">
                  <table>
                      <thead>
                          <tr>
                              <th colspan="2" class="table-header"><span data-translate-key="result_header">Howrah Zilla Vigyan Manosikata-o-Medha Aviksha - </span>2026</th>
                          </tr>
                      </thead>
                      <tbody>
                          <tr>
                              <td data-translate-key="name">Name:</td>
                              <td>${student.name}</td>
                          </tr>
                          <tr>
                              <td data-translate-key="roll">Roll Number:</td>
                              <td>${student.roll}</td>
                          </tr>
                          <tr>
                              <td data-translate-key="class">Class:</td>
                              <td>${student.class}</td>
                          </tr>
                          <tr>
                              <td data-translate-key="school">School:</td>
                              <td>${student.school}</td>
                          </tr>
                          <tr class="highlight-row">
                              <td data-translate-key="admit_card">Admit Card:</td>
                              <td class="result-value"><a href="${student.pdfLink}" target="_blank" class="pdf-icon"><i class="fa-solid fa-file-pdf"></i></a></td>
                          </tr>
                          <tr class="highlight-row">
                              <td data-translate-key="previous_paper">Previous Paper:</td>
                              <td class="grade-highlight result-value"><a href="${student.questionLink}" target="_blank" class="pdf-icon"><i class="fa-solid fa-file-pdf"></i></a></td>
                          </tr>
                      </tbody>
                  </table>
              </div>`;

            resultsDiv.innerHTML = outputHTML;
            resultsDiv.className = 'success';
          } else if (data.length === 0) {
            resultsDiv.innerHTML = '<div data-translate-key="no_students_found">No students found.</div>';
            resultsDiv.className = 'error';
          } else {
            const lang = getLang();
            const template = window.translations[lang]['api_error'] || window.translations['en']['api_error'];
            const finalMessage = template.replace('${data.message}', data.message);
            resultDiv.innerHTML = finalMessage;
            resultDiv.className = 'error';
          }

        } catch (error) {
          console.error(error);
          resultsDiv.innerHTML = "Error fetching data. Ensure your Script is deployed as 'Anyone'.";
        } finally {
          // 4. RE-ENABLE BUTTON (Runs on both Success and Error)
          searchBtn.disabled = false;
        }

        if (window.applyTranslations) {
          window.applyTranslations();
        }
      }
    </script>
